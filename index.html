<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balsa Nova - Curiosidades</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    margin: 40px 0;
    font-size: 2.5em;
}

/* GRID PINTEREST */
.container {
    column-count: 3;
    column-gap: 20px;
    padding: 20px;
}

@media(max-width: 900px){
    .container { column-count: 2; }
}
@media(max-width: 600px){
    .container { column-count: 1; }
}

/* CARD */
.card {
    background: #1e293b;
    margin: 0 0 20px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    transform: translateY(40px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: scale(1.03);
}

/* IMAGEM */
.card img {
    width: 100%;
    display: block;
}

/* TEXTO */
.card h3 {
    padding: 15px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #1e293b;
    margin: 10% auto;
    padding: 30px;
    width: 80%;
    border-radius: 20px;
    animation: zoom 0.4s;
}

.close {
    float: right;
    font-size: 25px;
    cursor: pointer;
}

@keyframes zoom {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

</style>
</head>
<body>

<h1>🌎 Curiosidades sobre Balsa Nova</h1>

<div class="container" id="container"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fechar()">&times;</span>
    <p id="texto"></p>
  </div>
</div>

<script>

const dados = [
{
titulo: "Origem do nome",
img: "https://upload.wikimedia.org/wikipedia/commons/6/6f/Igreja_Balsa_Nova_PR.jpg",
texto: "🛶 O nome vem de uma balsa usada para atravessar o Rio Iguaçu."
},
{
titulo: "Tropeiros",
img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/Serra_do_Purun%C3%A3.jpg",
texto: "🐎 Era rota de tropeiros que levavam gado."
},
{
titulo: "Capela histórica",
img: "https://upload.wikimedia.org/wikipedia/commons/5/5f/Capela_Tamandu%C3%A1.jpg",
texto: "⛪ Possui uma capela do século XVIII."
},
{
titulo: "Natureza",
img: "https://upload.wikimedia.org/wikipedia/commons/0/0a/Recanto_dos_Papagaios.jpg",
texto: "🌄 Paisagens naturais incríveis."
},
{
titulo: "Serra do Purunã",
img: "https://upload.wikimedia.org/wikipedia/commons/8/8a/S%C3%A3o_Luiz_do_Purun%C3%A3.jpg",
texto: "🏞️ Trilhas e vistas lindas."
},
{
titulo: "Agricultura",
img: "https://upload.wikimedia.org/wikipedia/commons/2/2c/Plantacao_milho.jpg",
texto: "🌽 Forte produção agrícola."
},
{
titulo: "Ferrovia",
img: "https://upload.wikimedia.org/wikipedia/commons/9/9f/Trem_Parana.jpg",
texto: "🚂 Cresceu com a ferrovia."
}
];

const container = document.getElementById("container");

dados.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${item.img}">
        <h3>${item.titulo}</h3>
    `;

    card.onclick = () => abrir(item.texto);
    container.appendChild(card);

    setTimeout(() => card.classList.add("show"), i * 150);
});

function abrir(texto) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("texto").innerText = texto;
}

function fechar() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
